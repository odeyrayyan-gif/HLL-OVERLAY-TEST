<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: transparent; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px; 
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #ff9d00;
            display: flex;
            overflow: hidden; 
        }

        .ticker-move {
            display: flex;
            white-space: nowrap;
            will-change: transform;
        }

        .player-entry {
            display: inline-flex;
            align-items: center;
            padding: 0 30px; 
            font-size: 22px;
        }

        .rank {
            background: #ff9d00;
            color: black;
            font-weight: 900;
            padding: 1px 8px;
            border-radius: 3px;
            margin-right: 10px;
            font-size: 18px;
        }

        .name { font-weight: 800; color: #fff; margin-right: 12px; }
        .stat-label { color: #888; margin-right: 4px; font-size: 15px; }
        .stat-val { color: #ff9d00; font-weight: bold; margin-right: 15px; }
        .divider { color: rgba(255,255,255,0.3); }
        .msg-entry { gap: 10px !important; }
        .msg-icon { font-size: 18px; flex-shrink: 0; }
        .msg-text { font-weight: 800; font-size: 20px; color: #ff9d00; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div id="ticker" class="ticker-move"></div>
</div>

<script>
    const CONFIG_URL = "http://localhost:3000/config";

    async function fetchNoCache(url) {
        const sep = url.includes("?") ? "&" : "?";
        return fetch(url + sep + "t=" + Date.now(), { cache: "no-store" });
    }

    async function getEndpoint() {
        try {
            const r = await fetch("http://localhost:3000/config");
            if (!r.ok) return "";
            const settings = await r.json();
            return settings.api_endpoint || "";
        } catch { return ""; }
    }


    // Exclude armor crews and artillery gunners from infantry lists
    const EXCLUDED_WEAPONS_LIST = [
        'artillery','lefh','155mm','152mm','150mm','122mm','105mm','howitzer','sfh','brumm','stuh','strumpanzer','pak40','anti_tank',
        'zis3','88mm','75mm','76mm','tank','mine'
    ];
    function isArtyOrArmor(p) {
        if ((p.v_kills || 0) > (Number(p.kills || 0) * 0.4)) return true;
        if (!p.weapons) return false;
        const top = Object.entries(p.weapons).sort((a,b) => b[1]-a[1])[0];
        if (!top) return false;
        return EXCLUDED_WEAPONS_LIST.some(ex => top[0].toLowerCase().includes(ex));
    }
    // ── JS-driven scroll — never resets, content updates silently ──
    const SPEED = 80; // pixels per second
    let scrollX   = 0;
    let lastTime  = null;
    let halfWidth = 0;
    let rafId     = null;

    function scrollTick(ts) {
        if (lastTime !== null) {
            const dt = ts - lastTime;
            scrollX += (SPEED * dt) / 1000;
            if (halfWidth > 0 && scrollX >= halfWidth) {
                scrollX -= halfWidth;
            }
            document.getElementById('ticker').style.transform = `translateX(${-scrollX}px)`;
        }
        lastTime = ts;
        rafId = requestAnimationFrame(scrollTick);
    }

    async function updateTicker() {
        try {
            const endpoint = cachedEndpoint;
            if (!endpoint) return;

            const res = await fetchNoCache(endpoint);
            const data = await res.json();
            const stats = data?.result?.stats;

            if (Array.isArray(stats)) {
                const topKillers = stats
                    .filter(p => !isArtyOrArmor(p))
                    .sort((a, b) => b.kills - a.kills)
                    .slice(0, 10);

                const playerHtml = topKillers.map((p, index) => `
                    <div class="player-entry">
                        <span class="rank">${index + 1}</span>
                        <span class="name">${p.player}</span>
                        <span class="stat-label">K:</span><span class="stat-val">${p.kills}</span>
                        <span class="stat-label">Combat:</span><span class="stat-val">${p.combat}</span>
                        <span class="divider"> // </span>
                    </div>
                `).join('');

                let msgHtml = '';
                const active = getActiveMessages().filter(m => shouldShowMessage(m));
                active.forEach(m => { msgHtml += buildMessageHtml(m); markMessageShown(m); });
                loopCount++;

                const ticker  = document.getElementById('ticker');
                const combined = playerHtml + msgHtml;

                // Only update DOM if content actually changed
                if (ticker.dataset.lastHash !== combined) {
                    ticker.dataset.lastHash = combined;
                    // Update both halves in place — scroll position never touched
                    ticker.innerHTML = combined + combined;
                    // Measure new halfWidth after reflow — only happens on content change
                    void ticker.offsetWidth;
                    halfWidth = ticker.scrollWidth / 2;
                    // Keep scrollX in bounds for new width
                    if (halfWidth > 0) scrollX = scrollX % halfWidth;
                }
            }
        } catch (e) {
            console.error("Ticker update failed");
        }
    }

    // Refresh data every 2 minutes
    let cachedEndpoint = "";

    // ── TICKER MESSAGES ──────────────────────────────────────────────────
    let tickerMessages   = [];
    let loopCount        = 0;
    let lastMsgTime      = {};  // id → last shown timestamp

    function getActiveMessages() {
        // Only show messages targeted at the scroll ticker
        return tickerMessages.filter(m => m.active && (!m.target || m.target === "ticker"));
    }

    function shouldShowMessage(m) {
        const now = Date.now();
        switch(m.freq) {
            case 'every_loop':  return true;
            case 'every_3':     return loopCount % 3 === 0;
            case 'every_5':     return loopCount % 5 === 0;
            case 'every_10':    return loopCount % 10 === 0;
            case 'every_2min':  return !lastMsgTime[m.id] || now - lastMsgTime[m.id] >= 120000;
            case 'every_5min':  return !lastMsgTime[m.id] || now - lastMsgTime[m.id] >= 300000;
            case 'every_10min': return !lastMsgTime[m.id] || now - lastMsgTime[m.id] >= 600000;
            case 'every_15min': return !lastMsgTime[m.id] || now - lastMsgTime[m.id] >= 900000;
            case 'every_30min': return !lastMsgTime[m.id] || now - lastMsgTime[m.id] >= 1800000;
            default: return true;
        }
    }

    function markMessageShown(m) {
        lastMsgTime[m.id] = Date.now();
    }

    const PLATFORM_COLORS = {
        twitch: '#9146ff', youtube: '#ff0000', tiktok: '#00f2ea',
        twitter: '#ffffff', discord: '#5865f2', instagram: '#e1306c', general: '#ff9d00'
    };


    const PLATFORM_SVGS = {
        general:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="#ff9d00"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>`,
        twitch:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="#9146ff"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
        youtube:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
        tiktok:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.2 8.2 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>`,
        twitter:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`,
        discord:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="#5865f2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
        instagram: `<svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="igt" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f09433"/><stop offset="50%" style="stop-color:#dc2743"/><stop offset="100%" style="stop-color:#bc1888"/></linearGradient></defs><path fill="url(#igt)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>`,
    };
    function getPlatformSvg(p) { return PLATFORM_SVGS[p] || PLATFORM_SVGS.general; }
    function buildMessageHtml(m) {
        const color = PLATFORM_COLORS[m.platform] || '#ff9d00';
        return `
            <div class="player-entry msg-entry" style="border-left: 4px solid ${color}; background: rgba(0,0,0,0.6);">
                <span class="msg-icon">${getPlatformSvg(m.platform)}</span>
                <span class="msg-text" style="color:${color}">${m.text}</span>
                <span class="divider"> // </span>
            </div>`;
    }

    async function pollConfig() {
        try {
            const r = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
            if (!r.ok) throw new Error("config " + r.status);
            const cfg = await r.json();
            if (cfg && cfg.api_endpoint !== undefined) {
                cachedEndpoint = cfg.api_endpoint || "";
                tickerMessages = cfg.ticker_messages || [];
            }
        } catch(e) { console.warn("[HLL] pollConfig failed:", e.message); }
    }
    pollConfig().then(() => {
        updateTicker();
        rafId = requestAnimationFrame(scrollTick);
    });
    setInterval(pollConfig, 1000);
    setInterval(updateTicker, 4000);
</script>
</body>
</html>
