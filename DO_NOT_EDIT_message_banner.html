<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLL Message Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
        }

        .banner-wrap {
            position: absolute;
            bottom: 80px; /* sits above the ticker banner */
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .banner-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 28px;
            background: rgba(7, 10, 16, 0.92);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            max-width: 900px;

            /* Hidden by default */
            opacity: 0;
            transform: translateY(40px) scale(0.85);
            pointer-events: none;
        }

        .banner-card.show {
            animation: pixarBounceIn 0.5s cubic-bezier(0.22, 1.8, 0.36, 1) forwards;
        }

        .banner-card.hide {
            animation: slowFadeOut 2.5s ease forwards;
        }

        @keyframes pixarBounceIn {
            0%   { opacity: 0; transform: translateY(60px) scale(0.7); }
            60%  { opacity: 1; transform: translateY(-12px) scale(1.04); }
            80%  { transform: translateY(5px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slowFadeOut {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            70%  { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(8px) scale(0.97); }
        }

        .banner-accent {
            width: 4px;
            height: 100%;
            min-height: 36px;
            border-radius: 2px;
            flex-shrink: 0;
            align-self: stretch;
        }

        .banner-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .banner-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="banner-wrap">
    <div class="banner-card" id="card">
        <div class="banner-accent" id="accent"></div>
        <div class="banner-icon" id="icon"></div>
        <div class="banner-text" id="text"></div>
    </div>
</div>

<script>
    const CONFIG_URL = "http://localhost:3000/config";

    const PLATFORM_COLORS = {
        twitch: '#9146ff', youtube: '#ff0000', tiktok: '#ffffff',
        twitter: '#ffffff', discord: '#5865f2', instagram: '#e1306c', general: '#ff9d00'
    };

    const PLATFORM_SVGS = {
        general:   `<svg width="22" height="22" viewBox="0 0 24 24" fill="#ff9d00"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>`,
        twitch:    `<svg width="22" height="22" viewBox="0 0 24 24" fill="#9146ff"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
        youtube:   `<svg width="22" height="22" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
        tiktok:    `<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.2 8.2 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>`,
        twitter:   `<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`,
        discord:   `<svg width="22" height="22" viewBox="0 0 24 24" fill="#5865f2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
        instagram: `<svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="igb" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f09433"/><stop offset="50%" style="stop-color:#dc2743"/><stop offset="100%" style="stop-color:#bc1888"/></linearGradient></defs><path fill="url(#igb)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>`,
    };

    // ── State ──
    let tickerMessages = [];
    let messageQueue   = [];  // messages waiting to show
    let isShowing      = false;
    let loopCount      = 0;
    let lastMsgTime    = {};

    // Hold duration — shorter in test mode
    const HOLD_MS_NORMAL = 4000;
    const HOLD_MS_TEST   = 1500;

    // ── Config polling ──
    async function pollConfig() {
        try {
            const r = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
            if (!r.ok) throw new Error(r.status);
            const cfg = await r.json();
            if (cfg && cfg.ticker_messages !== undefined) {
                tickerMessages = cfg.ticker_messages || [];
            }
        } catch(e) {}
    }

    function shouldShowMessage(m) {
        const now = Date.now();
        const elapsed = !lastMsgTime[m.id] ? Infinity : now - lastMsgTime[m.id];
        switch(m.freq) {
            case 'test_5sec':   return elapsed >= 5000;
            case 'every_2min':  return elapsed >= 120000;
            case 'every_5min':  return elapsed >= 300000;
            case 'every_10min': return elapsed >= 600000;
            case 'every_15min': return elapsed >= 900000;
            case 'every_30min': return elapsed >= 1800000;
            default:            return elapsed >= 120000;
        }
    }

    function showMessage(m) {
        if (isShowing) return;
        isShowing = true;

        const color = PLATFORM_COLORS[m.platform] || '#ff9d00';
        const svg   = PLATFORM_SVGS[m.platform]   || PLATFORM_SVGS.general;

        document.getElementById('accent').style.background = color;
        document.getElementById('icon').innerHTML           = svg;
        document.getElementById('text').textContent         = m.text;
        document.getElementById('text').style.color         = color;

        const card = document.getElementById('card');
        card.className = 'banner-card show';

        // After hold duration trigger fade out
        const holdMs = m.freq === "test_5sec" ? HOLD_MS_TEST : HOLD_MS_NORMAL;
        setTimeout(() => {
            card.className = 'banner-card hide';
            setTimeout(() => {
                card.className = 'banner-card';
                isShowing = false;
                // Show next queued message if any
                if (messageQueue.length > 0) {
                    const next = messageQueue.shift();
                    setTimeout(() => showMessage(next), 500);
                }
            }, 2500); // match slowFadeOut duration
        }, holdMs);
    }

    function processMessages() {
        loopCount++;
        const active = tickerMessages.filter(m => m.active && m.target === "banner" && shouldShowMessage(m));
        active.forEach(m => {
            lastMsgTime[m.id] = Date.now();
            messageQueue.push(m);
        });
        if (!isShowing && messageQueue.length > 0) {
            showMessage(messageQueue.shift());
        }
    }

    // ── Timer — check for messages based on frequency ──
    pollConfig().then(() => {
        // Check if any test messages — fire immediately if so, else wait 3s
        const hasTest = (tickerMessages || []).some(m => m.active && m.target === 'banner' && m.freq === 'test_5sec');
        setTimeout(() => {
            processMessages();
        }, hasTest ? 500 : 3000);
        // Poll every 2 seconds for snappy test response
        setInterval(() => {
            pollConfig();
            processMessages();
        }, 2000);
    });

    setInterval(pollConfig, 2000);
</script>
</body>
</html>
