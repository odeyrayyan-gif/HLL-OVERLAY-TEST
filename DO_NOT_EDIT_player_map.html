<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLL Player Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 3840px; height: 2160px;
            background: transparent;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
            color: white;
        }

        .wrap {
            position: relative;
            width: 3840px; height: 2160px;
        }

        /* ── MAP CARD ── */
        .map-card {
            position: absolute;
            top: 60px; left: 60px;
            width: 2040px; height: 2040px;
            background: rgba(7, 10, 15, 0.95);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Grid background */
        .map-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 102px 102px;
        }

        /* Sector labels A-J across top, 1-10 down side */
        .sector-labels-top {
            position: absolute;
            top: 8px; left: 0; right: 0;
            display: flex; justify-content: space-around;
            padding: 0 51px;
        }
        .sector-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: rgba(255,255,255,0.12);
            letter-spacing: 2px;
        }
        .sector-labels-left {
            position: absolute;
            top: 0; left: 8px; bottom: 0;
            display: flex; flex-direction: column;
            justify-content: space-around;
            padding: 51px 0;
        }

        /* Canvas for player dots */
        #mapCanvas {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
        }

        /* ── HEADER ── */
        .map-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
            border-bottom: 2px solid rgba(172,46,46,0.5);
            z-index: 10;
        }
        .map-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: white;
        }
        .map-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            color: #ac2e2e;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .map-header-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
        .map-status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .map-status.live { color: #00ff88; }
        .map-status.offline { color: #ac2e2e; }

        /* ── LEGEND / SIDEBAR ── */
        .sidebar {
            position: absolute;
            top: 60px; right: 60px;
            width: 1540px; height: 2040px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .squad-panel {
            background: rgba(7, 10, 15, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 30px;
            flex: 1;
            overflow: hidden;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .panel-title.allies { color: #00a2ff; border-bottom-color: rgba(0,162,255,0.2); }
        .panel-title.axis   { color: #ff3c00; border-bottom-color: rgba(255,60,0,0.2); }

        .squad-group {
            margin-bottom: 18px;
        }

        .squad-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        .squad-player {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .role-icon {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .player-name {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .player-kills {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: #ff9d00;
            flex-shrink: 0;
        }

        .sl-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            background: #ff9d00;
            color: black;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            position: absolute;
            bottom: 20px; left: 60px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
<div class="wrap">

    <!-- Map card -->
    <div class="map-card">
        <!-- Header -->
        <div class="map-header">
            <div class="map-title">Live Map</div>
            <div class="map-name" id="mapName">LOADING...</div>
            <div class="map-header-line"></div>
            <div class="map-status offline" id="mapStatus">NO SIGNAL</div>
        </div>

        <!-- Grid -->
        <div class="map-grid" style="top:70px;"></div>

        <!-- Sector labels top -->
        <div class="sector-labels-top" style="top:78px;">
            <span class="sector-label">A</span>
            <span class="sector-label">B</span>
            <span class="sector-label">C</span>
            <span class="sector-label">D</span>
            <span class="sector-label">E</span>
            <span class="sector-label">F</span>
            <span class="sector-label">G</span>
            <span class="sector-label">H</span>
            <span class="sector-label">I</span>
            <span class="sector-label">J</span>
        </div>

        <!-- Sector labels left -->
        <div class="sector-labels-left" style="top:70px;">
            <span class="sector-label">1</span>
            <span class="sector-label">2</span>
            <span class="sector-label">3</span>
            <span class="sector-label">4</span>
            <span class="sector-label">5</span>
            <span class="sector-label">6</span>
            <span class="sector-label">7</span>
            <span class="sector-label">8</span>
            <span class="sector-label">9</span>
            <span class="sector-label">10</span>
        </div>

        <!-- Canvas for player dots -->
        <canvas id="mapCanvas" style="top:70px; width:2040px; height:1970px;"></canvas>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <!-- Allies panel -->
        <div class="squad-panel">
            <div class="panel-title allies" id="alliesTitle">ALLIES</div>
            <div id="alliesSquads"></div>
        </div>
        <!-- Axis panel -->
        <div class="squad-panel">
            <div class="panel-title axis">GERMANY</div>
            <div id="axisSquads"></div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">SYNCING...</div>
</div>

<script>
const CONFIG_URL       = "http://localhost:3000/config";
const GAMESTATE_SUFFIX = "/api/get_gamestate";
const TEAMVIEW_SUFFIX  = "/api/get_team_view";

// ── Role icons ──
const ROLE_ICONS = {
    "officer":          "⭐",
    "squad_leader":     "⭐",
    "rifleman":         "🔫",
    "assault":          "⚡",
    "automatic_rifleman": "🔴",
    "medic":            "➕",
    "support":          "📦",
    "heavy_machinegunner": "💥",
    "anti_tank":        "🚀",
    "sniper":           "🎯",
    "engineer":         "🔧",
    "tank_commander":   "🛡️",
    "crewman":          "🔩",
    "spotter":          "👁️",
    "artillery_officer":"💣",
    "armycommander":    "👑",
};

function getRoleIcon(role) {
    if (!role) return "•";
    const r = role.toLowerCase().replace(/ /g,'_');
    return ROLE_ICONS[r] || "•";
}

function isSquadLeader(role) {
    if (!role) return false;
    const r = role.toLowerCase();
    return r.includes('officer') || r.includes('squad_leader') || r.includes('armycommander');
}

// ── Coordinate normalization ──
// HLL world coords are typically in the range of roughly -150000 to 150000
// We auto-detect bounds from current player positions
let coordBounds = null;

function detectBounds(players) {
    let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
    let count = 0;
    players.forEach(p => {
        if (!p.world_position) return;
        const x = p.world_position.x;
        const y = p.world_position.y;
        if (x !== undefined && y !== undefined) {
            xMin = Math.min(xMin, x);
            xMax = Math.max(xMax, x);
            yMin = Math.min(yMin, y);
            yMax = Math.max(yMax, y);
            count++;
        }
    });
    if (count < 2) return null;
    // Add 10% padding
    const xPad = (xMax - xMin) * 0.1;
    const yPad = (yMax - yMin) * 0.1;
    return {
        xMin: xMin - xPad, xMax: xMax + xPad,
        yMin: yMin - yPad, yMax: yMax + yPad
    };
}

function normalize(val, min, max, size) {
    if (max === min) return size / 2;
    return ((val - min) / (max - min)) * size;
}

// ── Draw map ──
function drawMap(allPlayers, swapped) {
    const canvas = document.getElementById('mapCanvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    if (!allPlayers.length) return;

    // Detect bounds from all player positions
    const bounds = detectBounds(allPlayers);
    if (!bounds) return;
    coordBounds = bounds;

    allPlayers.forEach(p => {
        if (!p.world_position) return;
        const x = normalize(p.world_position.x, bounds.xMin, bounds.xMax, W);
        const y = normalize(p.world_position.y, bounds.yMin, bounds.yMax, H);

        // Determine team
        const team = (p.team || "").toLowerCase();
        const isAxis = team.includes('axis') || team.includes('ger');
        const isAllies = !isAxis;

        // Visual swap
        const showAsAxis   = swapped ? isAllies : isAxis;
        const color        = showAsAxis ? '#ff3c00' : '#00a2ff';
        const glowColor    = showAsAxis ? 'rgba(255,60,0,0.4)' : 'rgba(0,162,255,0.4)';

        const isSL = isSquadLeader(p.role);
        const radius = isSL ? 18 : 12;

        // Glow
        ctx.beginPath();
        ctx.arc(x, y, radius + 8, 0, Math.PI * 2);
        ctx.fillStyle = glowColor;
        ctx.fill();

        // Dot
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        // Squad leader ring
        if (isSL) {
            ctx.beginPath();
            ctx.arc(x, y, radius + 4, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff9d00';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Role icon text
        const icon = getRoleIcon(p.role);
        ctx.font = `${isSL ? 16 : 13}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white';
        ctx.fillText(icon, x, y);
    });
}

// ── Render squad list ──
function renderSquads(squads, elementId, color) {
    const el = document.getElementById(elementId);
    if (!el) return;

    if (!squads || !Object.keys(squads).length) {
        el.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:16px;">No data</div>';
        return;
    }

    let html = '';
    Object.entries(squads).forEach(([squadName, squad]) => {
        if (!squad.players || !squad.players.length) return;
        html += `<div class="squad-group">`;
        html += `<div class="squad-name">${squadName}</div>`;
        squad.players.forEach(p => {
            const isSL = isSquadLeader(p.role);
            html += `<div class="squad-player">
                <div class="role-icon">${getRoleIcon(p.role)}</div>
                <div class="player-name" style="color:${color}">${p.name || p.player || '?'}</div>
                ${isSL ? '<div class="sl-badge">SL</div>' : ''}
                <div class="player-kills">K:${p.kills || 0}</div>
            </div>`;
        });
        html += `</div>`;
    });

    el.innerHTML = html || '<div style="color:rgba(255,255,255,0.2);font-size:16px;">No squads</div>';
}

// ── Main update ──
let cachedConfig = { api_endpoint: '', swap_sides: false, allied_faction: 'ALLIES' };

async function pollConfig() {
    try {
        const r = await fetch(CONFIG_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const cfg = await r.json();
        if (cfg && cfg.api_endpoint !== undefined) cachedConfig = cfg;
    } catch(e) {}
}

async function update() {
    const statusEl  = document.getElementById('statusBar');
    const mapNameEl = document.getElementById('mapName');
    const mapStatus = document.getElementById('mapStatus');

    try {
        const cfg = cachedConfig;
        if (!cfg.api_endpoint) {
            mapStatus.className = 'map-status offline';
            mapStatus.textContent = 'NO API';
            return;
        }

        // Derive base URL from api_endpoint
        const url = new URL(cfg.api_endpoint);
        const base = url.origin;
        const swapped = cfg.swap_sides;
        const alliedName = cfg.allied_faction || 'ALLIES';

        // Fetch gamestate for map name
        let mapName = 'UNKNOWN MAP';
        try {
            const gsRes = await fetch(base + GAMESTATE_SUFFIX + '?t=' + Date.now(), { cache: 'no-store' });
            if (gsRes.ok) {
                const gs = await gsRes.json();
                const result = gs.result || gs;
                if (result.map && result.map.pretty_name) {
                    mapName = result.map.pretty_name.toUpperCase();
                } else if (result.current_map && result.current_map.pretty_name) {
                    mapName = result.current_map.pretty_name.toUpperCase();
                } else if (result.pretty_name) {
                    mapName = result.pretty_name.toUpperCase();
                }
            }
        } catch(e) {}
        mapNameEl.textContent = mapName;

        // Fetch team view for positions and squads
        const tvRes = await fetch(base + TEAMVIEW_SUFFIX + '?t=' + Date.now(), { cache: 'no-store' });
        if (!tvRes.ok) throw new Error('Team view offline');
        const tvData = await tvRes.json();
        const result = tvData.result || tvData;

        // Extract allied and axis data
        const alliedData = result.allies || result.allied || {};
        const axisData   = result.axis   || {};

        // Flatten all players for map drawing
        const allPlayers = [];

        function extractPlayers(teamData, teamName) {
            const squads = teamData.squads || teamData;
            Object.values(squads).forEach(squad => {
                if (!squad.players) return;
                squad.players.forEach(p => {
                    allPlayers.push({ ...p, team: teamName });
                });
            });
            // Also commander if present
            if (teamData.commander && teamData.commander.player) {
                allPlayers.push({ ...teamData.commander.player, team: teamName, role: 'armycommander' });
            }
        }

        extractPlayers(alliedData, 'allies');
        extractPlayers(axisData, 'axis');

        // Draw the map
        const canvas = document.getElementById('mapCanvas');
        canvas.width  = 2040;
        canvas.height = 1970;
        drawMap(allPlayers, swapped);

        // Render squad lists
        document.getElementById('alliesTitle').textContent = swapped ? 'AXIS' : alliedName;
        renderSquads(alliedData.squads || alliedData, 'alliesSquads', swapped ? '#ff3c00' : '#00a2ff');
        renderSquads(axisData.squads   || axisData,   'axisSquads',   swapped ? '#00a2ff' : '#ff3c00');

        mapStatus.className = 'map-status live';
        mapStatus.textContent = `LIVE · ${allPlayers.length} PLAYERS`;
        statusEl.textContent = `SYNCED: ${new Date().toLocaleTimeString()} · ${allPlayers.length} PLAYERS TRACKED`;

    } catch(e) {
        mapStatus.className = 'map-status offline';
        mapStatus.textContent = 'SIGNAL LOST';
        statusEl.textContent = `ERROR: ${e.message}`;
    }
}

pollConfig().then(() => update());
setInterval(pollConfig, 1000);
setInterval(update, 3000);
</script>
</body>
</html>
